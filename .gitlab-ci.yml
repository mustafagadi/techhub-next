# GitLab CI/CD for the TechHub frontend (Next.js). Four stages: install+lint, unit tests, a
# versioned image pushed to the project's own Container Registry on the default branch/tags, and
# manual deploy jobs per environment. See deploy/ENVIRONMENTS.md for what each one does and how to
# run it by hand.

stages:
  - build
  - test
  - docker
  - deploy

variables:
  IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

.node_cache: &node_cache
  cache:
    key:
      files: [package-lock.json]
    paths: [node_modules/]

# ───────────────────────────── build + test (every branch, every MR) ─────────────────────────────

install:
  stage: build
  image: node:20-alpine
  <<: *node_cache
  script:
    - npm ci --no-audit --no-fund
  artifacts:
    paths: [node_modules/]
    expire_in: 1 hour

lint:
  stage: test
  image: node:20-alpine
  needs: ["install"]
  script:
    - npm run lint

test:
  stage: test
  image: node:20-alpine
  needs: ["install"]
  script:
    - npm test -- --ci

build-check:
  stage: test
  image: node:20-alpine
  needs: ["install"]
  # Compiles against placeholder build-time values, purely to catch a broken build early —
  # the real, environment-specific build happens again inside the Docker image below.
  variables:
    BACKEND_URL: "http://localhost:5080"
    NEXT_PUBLIC_API_BASE: "/api"
  script:
    - npm run build

# ───────────────────────────── image build + push (default branch + tags only) ─────────────────────────────
# Uses GitLab's own Container Registry ($CI_REGISTRY_IMAGE) and the built-in job token — no external
# registry credentials to manage. Tagged with the short commit SHA so every build stays addressable
# on the server (rollback = point IMAGE_TAG at an older SHA, no rebuild — see ENVIRONMENTS.md).
# NEXT_PUBLIC_*/BACKEND_URL are baked into the client bundle at this step, per environment — see
# the two Docker build-args sets below; adjust to match each environment's real backend origin.

docker:
  stage: docker
  image: docker:26
  services:
    - docker:26-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$IMAGE" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$IMAGE"
    - docker push "$CI_REGISTRY_IMAGE:latest"

# ───────────────────────────── deploy (manual — fill in the server details below) ─────────────────────────────
# Both jobs are `when: manual` and only a starting point: they assume an SSH-reachable host with
# this repo (or just deploy/) checked out and Docker installed. Set these as CI/CD variables
# (Settings → CI/CD → Variables) before enabling either job:
#   DEPLOY_SSH_KEY        — private key for a user allowed to `docker compose` on the target host
#   DEPLOY_STAGING_HOST   / DEPLOY_PRODUCTION_HOST   — user@host
#   DEPLOY_STAGING_PATH   / DEPLOY_PRODUCTION_PATH   — checkout path on that host

.deploy_template: &deploy_template
  stage: deploy
  image: alpine:3.20
  when: manual
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "${DEPLOY_HOST#*@}" >> ~/.ssh/known_hosts

deploy-staging:
  <<: *deploy_template
  environment:
    name: staging
  variables:
    DEPLOY_HOST: $DEPLOY_STAGING_HOST
  script:
    - ssh "$DEPLOY_STAGING_HOST" "cd $DEPLOY_STAGING_PATH && git pull && IMAGE_TAG=$CI_COMMIT_SHORT_SHA docker compose -f deploy/docker-compose.staging.yml --env-file .env.staging up -d --build"

deploy-production:
  <<: *deploy_template
  environment:
    name: production
  variables:
    DEPLOY_HOST: $DEPLOY_PRODUCTION_HOST
  script:
    - ssh "$DEPLOY_PRODUCTION_HOST" "cd $DEPLOY_PRODUCTION_PATH && git pull && IMAGE_TAG=$CI_COMMIT_SHORT_SHA docker compose -f deploy/docker-compose.production.yml --env-file .env.production up -d --build"
